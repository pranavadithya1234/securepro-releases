name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main        # Auto-deploys every time you push to main
  workflow_dispatch: # Also lets you trigger manually from GitHub Actions UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload website folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website-deploy   # Only deploys the website-deploy/ folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
